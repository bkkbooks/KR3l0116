body:
  text: 茅亭客話卷六宋黄休復撰悼蜀詩左傳曰天災流行國家代有益部淳化甲午歳盜起卭蜀圍逼城壘主帥素無禦備遂奔劒門賊乗勢入城燒掠殺傷至甚坤維間凡數十軍州悉為賊之所有唯眉陵梓遂堅壁自守賊據益郡凡百日天兵至戮無遺𩔖軍旅所過皆為荆棘朝廷除樞密直學士尚書虞部郎中張詠知益州始至察民疾苦洞知亂起之由因為悼蜀詩四十韻今備録之序云至道紀號元祀春正月為審官院考績引對天子曰天厭西蜀歳且荐饑任失其人枉政偷剥民興怨嗟搆孽肆暴授命虎旅殄滅兇逆矧彼黔首不聊其生觀人去民朕意㒺怠寛即育姦猛即殘俗得夫濟者實之其人爾惟方直厯政有績卭僰幽遐往理其俗克畏克愛汝其欽哉祗奉厥命乗輅西征夏四月二十有八日供厥職噫謀筭庸陋㒺敢怠忽豪猾抑之賦歛乃省存恤窮困撫綏流亡杜絶剝削宣揚皇風迨一歳而民弗克安非郡縣之罪也有聴者孰不知民心上畏王師之剽掠下畏草孽之强暴乎良家困弊漸復從賊庶賖其死深可忿也天子逺九重孤賤者憚權豪不敢言嗚呼雖采詩之官闕之久矣然歌詠諷刺之道不可寂然詠敢作悼蜀詩四十韻書于視政之㕔有識君子勿以狂瞽為罪蜀國冨且庶風俗矜浮薄奢侈極珠貝狂佚務娯樂虹橋吐飛泉煙桞閉朱閣燭影逐星沈歌聲和月落鬭雞破百萬呼盧縱大􅛐遊女白玉璫嬌馬黃金絡酒肆夜不扄花事春慚怍禾稼暮雲連紈繡淑氣錯熙熙三十年光景倐如昨天道本害盈侈極必禍作當時布政者㒺思救民瘼不能宣淳化移風復儉約性情非直方多為聲色著從欲竊虛譽隨俗縱貪玃蚕食生靈肌作威恣暴虐佞㒺天子聽所利唯剥削一方忿恨興千里攘臂躍火氣烘寒空雪彩揮蓮鍔無人能却敵何暇施擊柝害物黷貨輩皆為白刃爍瓦爍積臺榭荆棘迷城郭里第鎖榛蕪庭軒喧燕雀斗粟金帛市束芻綺羅博悲夫驕奢民不能飽葵藿朝廷命元戎帥師盪元惡虎旅一以至梟巢一何弱燎毛熖晶熒破竹鋒熠爚兵驕不可戢殺人如戲謔悼髦皆罹誅玉石何所度未能戮强暴爭先謀剽掠良民生計空賖死心殞穫四野搆豺狼五畝孰耕鑿黔首不安堵炎如居鼎鑊出師不以律餘孽何由却俾夫熾蜂蠆寡算能籠絡邊陲未肅淸胡顔食天爵世方尚奔競誰復振譽諤黃屋逺萬里九重高寥廓時稱多英雄才豈無衛霍近聞命良臣拭目觀竒略艾延祚成都漆匠艾延祚甲午歳為賊所驅於郡署令造漆器五月六日或聞鼓鼙聲及南門火起乃天兵至郡也延祚因上樹匿於穠葉間見天軍往來搜捕殺戮至夜遂下樹於積屍中臥至中宵聞傳呼頗𩔖將吏有十數人且無燭炬因竊視之不見其形但聞按據簿籍稱㸃姓名僵屍聞呼一一應之唯不唱艾延祚而過僵屍相接猶檢閱未已乃知聖朝討叛伐逆屠戮之數奉天行誅故無誤矣夷人婦甲午歳五月天兵克益郡至八月賊支進猶據嘉州宿崇儀翰領兵討之軍次洪雅有卒掠獲一夷人婦頗有姿色置於兵幕之下每欲逼之云自有伉儷則交臂疊膝俯地而坐軍人怒許其斷頸剖心終而不能屈堅肆强暴拒之轉甚三日不飲食以死繼之竟不能犯以非禮主帥聞而憫之使送還本家嗟乎雖蠻夷而能堅貞强暴者不能侵侮之華夏無廉潔者得無愧乎張光贊張光贊者金水石城山張羅漢之裔也以其善畫羅漢因以名之每於寺觀粧畫功徳多厯春夏隨僧飲食其性謹慤守道不侈如是五十餘年人皆敬重之甲午歳為賊所執迫令引頸凡數劒而頸不斷遂於積屍中卧至夜央見一老僧曰汝生糚畫功徳用心吾來救汝言訖開目無所苦焉至今頸上創痕猶在吁西方聖人恩祐明顯有若是之徴邪金相輪北夢瑣言云咸通中高太尉鎮西川雅州胡蘆關有道藝王劒者渤海聞其名俾蜀人呂尚致意召之呂至王生夫婦止一草屋有一榻以箔隔限之嫗曰客至以何待之王曰州中都押衙今日有筵㑹可去取之俄而酒饌俱至品味羅列非忽遽之所能致也量其家去即往來不啻百里吕怪愕王生笑曰雲南蠻王曾鑄金相輪祈我賫換成都福感寺塔上相輪蜀人安得知之當時敬之者十有六七焉洎淳化五年狂盜入城兵火沿焚福感寺塔相輪墜地完全俱是銅鐵所為非蠻王金換之者葢王劒寓言孫氏傳聞不細爾金寶化為煙蜀州江源縣村甿王盛者凶暴人也與賊王小波李順為侣甲午歳據益州授草補儀鸞使部領子弟百餘人擄掠婦女剽刼財帛殺人不知紀極驅迫在城貧民指引豪家收藏地窖因掘得一處古藏銀皆笏鋌金若黑鋌珠玉器皿之屬皆是古制尋將指引者殺之負其金帛三十餘擔往江源山窖埋之同埋者尋亦殺之恐洩于外也城中貨金銀魏氏子婦被虜在於賊所不知音耗其夫常募人訪於卭蜀賊境寂然影響至三月方知在此賊家良人及弟謝元穎者將金帛購之二人亦沈于江中八月大軍收蜀此賊歸明衣錦袍銀帶入城見者無不切齒先是歸明者例發遣赴闕賊遂棄袍帶逃歸江源妻子告云埋藏物處數日火煙如窑遂潛往掘看悉皆空矣驚愕之際官軍捕獲入城遂寘于法嗚呼殺人取財寃毒滋多不為己用身遭屠戮向來火煙起處金寶已空愚嘗聞金寶藏於地中偶見者或變其質此得非化去耶鬼神匿之耶奢侈不久甲午歳順寇攻益部有不逞輩隨賊執兵杖劫掠民家財貨又附賊害民誅求無厭天兵平賊下寛大之詔應脇從徒黨皆宥而不問放令歸農此輩茍避誅戮又多金帛乃蕩心熾意自以為終身不復羈紲也乗肥衣輕歌酒娯樂玩好珍異喪葬婚聘踰越僭侈視親若讎如是不一數年災厲疾疫公私事訟相繼而作財物消盡車馬屋宇皆為他人所有其貧如初嗟乎不義之物似有神明所掌得之者不罹其禍而身獲存者鮮矣夫善人冨謂之天賞淫人冨謂之天殃此輩天以殃之其是之謂乎劉旴至道丁酉歳秋八月諸州巡檢作坊使韓景祐至懷安軍為其下廣武卒劉旴等謀殺之韓踰垣而免是夜軍賊掠懷安軍及明取金堂古城漢州凡六日行五百餘里劫掠五軍州十鎮縣所至處皆不及支梧驅掠軍民勢莫可遏州縣震懾户口奔逃時知府張密學謂招安使上官正曰賊今日卭州來日必奔嘉眉州賊若有盤泊處如魚得淵卒難除討君必悔之今日請即往移兵渡江逆而擊之奪其膽氣當盡擒之此上䇿也時不可失上官遂㸃集兵甲前去過新津江遇賊食於方井馳告張密學張曰劉既入井更欲何逃日中以捷來告盡殺其黨凱旋且張公料敵先見皆此𩔖也上官能將其兵是行也易於摧枯川界由是肅然茅亭客話卷六
