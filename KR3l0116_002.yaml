body:
  text: 茅亭客話卷二宋黃休復撰王客王客者失其名及鄉里常擕笻挈籃引一斑犬往來卭僰間以採藥為事多止於荒廟廢寺中雖雪霜風雨亦無所避優游市肆人或問修養之道卽黙而不對好事者多飲之以酒積數年形貌服飾未嘗更易天禧戊午歳春自言遊青城山迴時臨卭宰師仲冉頗好道藝思見其人即令召之與語且曰飲酒否對曰某有少藥君能服之某亦飲酒師侯受藥各飲數盃欵話移時云吾儕野人心近雲鶴久居城市頗思歸鄉誠有奉託辭出往故驛路去師侯餌藥漸覺輕安專令人訪之至四月二十七日獨擕杖負笈往臨溪路一里間有寺曰國寧遂於寺門下坐行人問之日將暮矣於此久坐何為答曰我有師在此至暝忽暴卒于門下鄉耆聞官權瘞于道左至六月師侯聞之曰曩所言久别家山頗思歸鄉斯之謂乎遣吏趙秀往彼焚之發其尸顔貌如生手足皆軟若熟寐焉頃之身下清泉湧出浮屍而起遂就沐浴之鄉村聚觀或以衣服歛之兼及設酒饌而祭者師侯曰吾聞仙人不死脫有死者乃尸解也此人真解化乎身雖委蛻神未遐逝自輟俸以瘞之且旌異人也前所言有師在此其是之謂乎休復嘗讀登真𨼆訣謂仙道有昇天躡雲者遊行五岳者服餌不死者尸解而仙者忽有蹔遊太隂自有太一守尸三魂營骨七魄衛肉胎靈録氣雖以鐵石牢固藏閉終至煉形數滿當自擘石飛空而仙者夫得道之士入火不爍入水不濡躡空如履實觸實如蹈虛雖九地之厚巨海之廣八極之逺萬方之大應倐欻而至何所拘滯耶所以然者形與道合道無不在毫芒之細萬物之衆道皆有之今備録者與王客張本也崔尊師崔尊師名無斁王氏據蜀由江呉而來託以聾聵誠有道之士也每觀人書字而知休咎能察𨼆伏逃亡山藏地秘生期死限千里之外骨肉安否未嘗遺策時朝賢士庶奉之如神明龍興觀道士唐洞卿令童子以器盛蘿蔔送杜天師光庭值崔在院門坐遂乞射覆崔令童子於地上劃一箇字童子劃一此字崔曰蘿蔔爾童子送迴拾一片損梳置於器中再乞射覆崔曰劃字於地童子指前來此字崔曰梳爾洞卿怪童子來遲童子具以崔射覆為對洞卿久知崔有道令童子握空拳再指此字崔曰空拳爾洞卿親詣崔曰一字而射覆者三皆不同非有道詎能及此崔曰皆是童子先言非老夫能知爾此字象蘿蔔亦象梳亦象空拳何有道邪崔相字託意指事皆如此𩔖王先主自天復甲子歳封蜀王伯盛之後展拓子城西南收玉局化起五鳯樓門五門雉堞巍峩飾以金碧窮極瑰麗輝煥通衢署曰得賢樓為當代之盛玉局化尊像並遷就龍興觀以其基址立殿宇廣庫藏時杜天師詣崔曰今主上遷移仙化其有証應乎崔嘆息良久言曰皇嗣作難爾甲戌歳果僞皇太子元膺叛尋伏誅後杜天師謂崔曰有道之士先識未能崔曰動局子亂必然之事何有道先識者哉杜天師曰此化畢竟若何崔曰局必須復非王氏不可也先主殂少主嗣位明年再起仙化以為王氏復局之驗也聖宋大中祥符甲寅歳知州諫大夫凌公策奏乞移王先主祠取其材植以修此化土木極備樓殿壯麗工木未畢或於玉局洞中出五色雲觀者千餘人移時而散尋畫圖呈進降詔奬諭即崔所言王氏復局之事証應何其逺哉休復嘗讀仙傳拾遺云二十四化各有一大洞或深廣千里五百里其中有日月飛精謂之伏辰之根下照洞口與人間無異有仙王仙官卿相輔佐如世之職司凡得道之人積功遷神返生者皆居其中以為民庶每年三元八節諸天上真下降洞中以觀其理善惡人世生死興廢水旱風雨皆預闗於洞府及龍神祠廟血食之司皆洞府之綂攝也二十四化之外有青城峩眉益登慈母繁陽嶓冡等洞又不在十大洞天并三十六洞天之數洞府之仙曹亦如人間之州郡爾夫天之所有誰能廢之違天必有大咎子亂之禍能無及此乎范處士范處士名徳昭蜀人也不知所修之道著通宗論契真刋謬論金液還丹論僞蜀主頻召入内問道稱㫖頗優禮之處士談論多及物情以鑒戒為先蜀人每中元節多生五穀俗謂之盆草盛以供佛初至時介意禁觸謂嘗有雷護之旣中元節後即棄之糞壤處士太息曰豈知聖人則天之明生其六氣因地之性用其五行斵木爲耜揉木為耒耒耨之利以教天下播種五穀以育於人而不知天地生育之恩輕棄五穀如是宜乎神明不祐而云獲禍悲夫李處士李處士名諶學識精博嘗講五經善誘誨人問無所𨼆四十餘年以束修自給每講春秋嘗云孔聖見周徳下衰諸侯强盛雖有典禮而不能舉雖有賞罰而莫得行孔子因是筆削魯史上遵周公之制下明將來之法以褒貶而代賞罰俾夫善人知勸而淫人知懼也左丘明魯國史官受經于孔子恐七十弟子各生異端失其大㫖遂以諸國簡牘博採衆記而作傳焉其傳忽先經以始事忽後經以終義忽依經以辯理忽錯經以合異廣記備言以成一家之通體爾杜征南不思孔子修經與詩書周易為等列丘明之傳當與司馬遷班固為等列豈合將經之年與傳之年相附參而貫之將令學者素無資稟縱意自裁但務聲律罔知古道將周孔之聖賢班馬之文章皆不由茲製作靡得而達焉然皇王帝霸之道興亡理亂之體其可聞乎遂引証當時以左傳文為春秋者數人今不具録休復屢見失其㫖歸如處士之言者倘能使春秋自為經左氏自為傳則不迷於後生者矣蘇推官僞蜀子城西南隅有道士開卜肆言人之生平休咎皆如目覩僞蜀廣政中進士蘇協杜希言同往訪之道士謂蘇曰秀才明年必成名蘇未甚信之道士曰成固定矣兼生貴子時内饋方孕逼期因是積以為驗顧杜曰秀才成何太晚耶杜不樂以為妄誕慍而退明年春蘇于制誥賈舎人下及第杜果無成蘇過杏園醼生一子卽易簡也至禮部侍郎叅知政事杜方悟道士之言遂再謁之問名第雖云晩成未審禄始何年秩終何地道士曰秀才勉旃必成大名然其事稍異不能言之杜生請之曰君成事之日在蘇先輩新長之子座下杜曰若保斯言欲辭福禄得乎道士曰從此以往未之或知也其年蘇授彭州司法叅軍改陸州軍事推官聖朝伐蜀赴闕累任外官其子果以狀元及第端拱二年由翰林學士知舉杜始得成都解南宫奏名登第授常州軍事推官不禄時子弟僑遊京師見杜云鄉知唯吾友一人見某老成遂言老成之始末故得書之然死生有命冨貴在天何道士見之逺也張海上僞蜀舉人張洸字海上雍熙丙戌歳往嘉州謁平羌令船次平羌溉下夜泊忽夢二人容貌端儼白衣華煥於洸前俯伏求救洸覺惟聞船棧下跳躑之聲不已視之乃二鯉魚焉洸性躁急不能容物怒此魚撓其寢遂扶棧取魚棄于江中旣而就寢復夢二白衣持大蒜數頭懇謝而去遲明方悟向夢者魚也至于平羌因以夢告平羌令令曰君之夢祥符也放魚所感蒜者筭也當延君筭爾洸至晚年著後隱書三卷亦紀夢魚之事享壽七十八而卒費尊師陵陽至道觀主費禹珪字天錫文學優贍時輩所稱偽蜀嘗應進士舉名絢或夢衣錦在井中覺後自喜曰及第衣錦遊鄉井爾他日因與知軍事推官蘇協論名第皆由隂注凡舉人將厯科場多有異夢禹珪因言前夢蘇曰非佳夢爾衣錦井中是文章未顯之兆費不悦來春果下第歸鄉因告蘇曰人生百年有如風燭止可怡神養志詩酒寄情更不能為屑屑之儒誠有雲栖之志矣蘇曰世祿暫榮浮生如寄唯登真履道可後為期也某有竪子雖愚請教授之即叅政侍郎也洎明年聖朝伐蜀蘇上京厯任至太平興國年中授開封府司録叅軍不祿休復嘗讀毉書云人藏氣隂多則夢數陽壯則夢稀有夢亦不復記之夫瞽者無夢愚者少夢故騶皁百夕無一夢乃知夢者習也又不獨至人者哉頃有士人能原夢遂撰一夢請占之災祥皆驗他日告云吾實無夢向所夢吾撰也聊以試君皆驗何也原夢者曰意形於言災祥隨之何況夢筆夢松者乎則知夢者不可以一事推之爾馮山人馮山人名懷古字德淳遂寧人也有人倫之鑒善辯山水地理太平興國中于青城山三蹊路牛心山前看花山後因卜居立三間大閣偃息于中居常所論皆丹石之㫖以吐納導引為事博採方訣歌頌圖記丹經道書無不研考每遇往來者有服餌者有入室求仙者有得襍藝者有能製服諸丹石者復有誇誕自譽壽過數百歳者有常與神仙往還者欲傳之者以方書為要授之者以金帛為情盡皆親近承事之雖伎藝無取皆以禮接之咸平中成都一豪家葬父徧訪能地理者𨕖山卜穴凡數歳方得之因令馮看之馮曰陵迴阜轉山高隴長水出分明甚奇絶也主人云自葬之後家財耗散人口淪亡何竒絶地如是耶山人曰頗要言之凡萬物中人最為靈受命於天與物且異而有貴賤各得其位如鳥有巢栖獸有穴處故無互相奪者也此山是葬公侯之地豈常人可處所以亡者不得安存者不得寧易曰負且乗致寇至小人而乗君子之器其是之謂乎李四郎李四郎名玹字廷儀其先波斯國人隨僖宗入蜀授率府率兄珣有詩名預賔貢焉玹舉止溫雅頗有節行以鬻香藥為業善弈棋好攝養以金丹延駐為務暮年以爐鼎之費家無餘財唯道書藥囊而已嘗得耳珠先生與青城南六郎書一紙論淮南三煉秋石之法每焚香熏之有一桃核盃圍可寸餘紋彩燦然真蟠桃之實爾至晚年末而服之雍熙元年遊青城山於六時巖下溪水中得一塊石如雁卵色黑溫潤嘗與同道者玩之一日誤墜于地碎為數片其中空焉可容一合許物四畔皆雕刻龍鳯雲草之形文理纖妙皆甚奇異殆非人工或曰此神仙所玩之物矣茅亭客話卷二
