body:
  text: 茅亭客話卷五宋黃休復撰黎海陽道士黎海陽其父偽蜀時為軍職天兵伐蜀海陽隨父戍劔門蜀軍潰散子父遂還於川城東門外丁村古冡忽聞冡內有非常香氣一日因晴明微隙中見少骸骨朽腐至甚旁有一藂黃粉因撥開乃見三小塊雄黃海陽父頗好燒鍊索知冡內雄黃可用遂以衣襟裹之至中夜忽聞人語父子問之曰語者鬼耶答云某非鬼某宋人也家世食祿而某不樂名宦退身學道于楚丘有别墅稍逺囂塵凡五金八石難得者必能致之或方法之士欲合煉試驗者必資其藥品給以爐鼎使成之時德宗疑韋中令在蜀與蠻人連結遂令某為道士入川見中令伺其動靜居止皇觀三年又遣僧行勤入蜀伺察中令初以談議苦空後説燒鍊點化之事中令厯試一一皆驗凡三年中令甚誠敬之或一日説還丹延駐之法中令愈加景奉後煉丹既成中令齋戒餌之初覺神氣清爽嗜好倍常僧遂辭去至貞元二十年暮春藥毒發而薨某為與行勤往還遂罹其禍而及此遭樵夫牧竪蹂踐遺骸潛壞朽骨憤憤不已海陽父曰君去世已逺何不還生人中而久處冥寞應曰某曾遇一高士以隂景煉形之道傳我遂於我楚丘别墅深山濬谷中選得一嵌室囑我祗持六年慎莫令諸物所犯歲滿則以衣服迎我於此其人初則支體􅀢敗唯藏腑不變某遂依其教諭乃閉護之至期開視則身全矣端坐于嵌室之內髮垂而黑髭直而粗顔貌光澤愈於初日某具湯沐新衣迎之云能如是三回乃度世畢矣某傳得此道今形已不全某今却自無形而煉成有形爾則上天入地千變萬化無不可也某之形雖未圓且飛行自在出幽入明軒冕之貴不樂於吾吾已離人世勞苦豈復降志於其間吾今之死不愈昔之生乎海陽父曰敢問其衣襟中藥是何等藥對曰某常從道士入山煉丹修葺爐鼎㸑薪鼓韛靡不勤力每嘆光景短促筋骸衰老所聞者上藥有九轉還丹不離乎神水華池其次有雲母雄黃服之雖不乘雲駕鳯役使鬼神亦可袪除百病補益夀年某得煉雄黃之法自二十歲服至四十歲獲其藥力苟再以火養就以水吞可冀道於髣佛海陽父告之曰餌藥之法則聞之矣煉形之道少得聞乎言未畢值天曉人行恐有人搜捕不及盡聽因别少逃竄之所自後不復至此海陽父乾德中卒海陽遂依其教服煉雄黃衣道士衣尋師訪道二十餘年不食唯飲酒衣服肌膚常有雄黃香氣淳化中在益州錦江橋下貨丹筋骨輕健甲午歲外寇入城海陽不出端坐繩牀為賊所殺惜哉白蝦蟇偽蜀將季延秋門內嚴真觀前蠶市有村夫鬻一白蝦蟇其質甚大兩目如丹聚視者皆云肉芝也有醫工王姓失其名以一緡市之歸所止慮其走匿因以一大臼合於地至暝石臼透明如燭籠王駭愕遂齋沐選日負鐺挈蟾辭家往青城山杳絶音耗洎明年聖朝伐蜀竟不知王之存亡也鮮于耆宿學射山舊名石斛山昔張百子三月三日得道上升今山上有至真觀即其遺迹也每歲至是日傾城士庶四邑居民咸詣仙觀祈乞田蠶時當春煦花木甚盛州主與郡寮將妓樂出城至其地車馬人物闐噎有耆宿鮮于熙者與朋友數人於萬歲池縱飲因掬池水見岸傍草中有一小白蝦蟇遂取之即席有姓劉失其名堅請看之鮮于固執不與遂嚙鮮于手取將吞之鮮于戲之曰閣下因吞此白蟾茍成得道也秪成強盜爾吞訖忙惶飲水云蝦蟇在某心胸間無所出處昏悶至家旬餘醫治方愈休復曾覽抱朴子內篇云肉芝者謂萬歲蟾蜍也頭上有角目赤頷下有丹紋體重而跳捷以五月五日午時取之隂乾以左足畫地成泉帶之辟兵若敵人射已弓弩皆反自傷焉今人以白蝦蟇為肉芝生吞熟啖者愚之甚也設使白蝦蟇是肉芝市井之民但知錐刀之利嗜欲無厭藏腑滓穢之氣與靈物相攻水火交戰寧有全人乎太平興國末休復與處士胡本立進士史載許僧隱巒往雙流縣保國觀看古柏樹道逢友人袁德隆從者於擔懸一蝦蟇大如扇許人皆駭視之後月餘再見袁因問向者蝦蟇所在袁曰是荷擔者獲于田隧中將歸殺而食之其夜無疾大呌數聲而卒食蝦蟇野菌頃有一士人好食鱔魚及鱉與蝦蟇嘗云此三物不可殺大者有毒殺人蝦蟇小者亦令人小便祕臍下憋疼有至死者宜以生豉一大合投新汲水半碗中浸令䜴水濃頓服之即差淳化中有民支氏於昭覺寺設齋寺僧市野椹有黑而斑者或黃白而赤者為齋食衆僧食訖悉皆吐瀉亦有死者至時有醫人急告之曰但掘地作坑以新汲水投坑中攪之澄清名曰地漿每服一小盞不過再三其毒即解當時甚救得人夫蕇菌之物皆是草木變化生樹者曰蕇生於地者曰菌皆濕氣鬱蒸而生又有生於腐骸毒蛇之上者大而光明人誤以為靈芝食而速死故書之警其誤矣虹霓淳化壬辰歲夏六月虹見時餉大雨愚友人李皓元云虹霓者隂陽之精也虹雄也霓雌也有青赤之色嘗依隂雲而晝是大隂亦不見日落西虹乃東見見必有雙鮮者雄色淡者雌也入人家飲水或福或凶有陳季和者云昔韋中令鎮蜀之日與賔客宴于西亭或暴風雨作俄有虹霓自空而下直入于亭垂首於筵中吸其食饌且盡焉其虹霓首似驢身若晴霞狀公懼且惡之曰虹霓者隂陽不和之氣妖沴之兆也遂罷宴座中一客曰公何憂乎真祥兆也夫虹霓者天使也降於邪則為戾降於正則為祥理則昭然公正人也是宜為祥敢為先賀旬餘就拜中書令孟氏初徐光溥宅虹霓入井飲水其母曰王蜀時有虹入吾家井中王先主取某家女為妃今又入吾家必有女為妃后男為將相此先兆矣未浹旬選其女入宫後從蜀主歸闕即惠妃也休復母氏常説眉州眉山縣桂枝鄉程氏某之祖裔焉伯父在偽蜀韓保貞幕任本州眉山縣令丁母憂歸村野服將闋時當夏杪天或隂翳見家庭皆如晚霞晃耀紅碧靄然時餉開霽甕釜之中井泉之內水皆涸盡時餉大雨雱霈而已未幾韓侍中授秦州節制伯父署節度推官將知虹霓者多為祥矣避雷至道丙申歲夏五月俳優人羅袂長有親戚居南郭井口莊袂長晨往訪之時有莊民網獲數魚袂長取三頭貫於傘中時歸至中路天色晦冥迅雷急雨林木皆傾火光燭地袂長恐魚是龍也棄之田畝中雷電益甚驚懼投村舍避之振栗不能自止俟其霽方歸來日遲明村人將傘與魚云夜來莊主差某相尋恐為雷雨所驚見雷霹傘簳取乖龍將去魚與傘遭雷火所燎拾得今將歸焉端拱戊子歲夏六月暴風雨雷震聖興寺羅漢院門屋柱折有三僧仆于地身如燔灼之狀世傳乖龍者苦於行雨而多方竄匿藏人身中或在古木楹柱之內及樓閣鴟甍中須為雷神捕之若在曠野無處逃避即入牛角或牧童之身往往為此物所纍遭雷震死俳優為逃而獲免茲僧不避而震殺語曰迅雷風烈必變易曰洊雷震君子以恐懼修省言君子常有戰戰兢兢不敢懈惰見天之怒畏雷之威恐罰及已也詩云敬天之怒不敢戲豫敬天之渝不敢馳驅其是之謂乎雨雹大中祥符癸丒歲龎永賢者寓居廣都縣夏四月日將暮忽烈風迅雷發屋拔樹雨雹繼之達曉方息詰朝詢諸行人云雹自縣東山橫布數十里西南沿江而下則更不知其逺邇也雨雹過處籬墻屋宇林木大者皆為雹擊雷拔之牛馬犬豕皆驚仆地鳥鵲小禽中者俱斃時麥方實無有孑遺有一村人云某家是夜數雹穿屋而落大如斗盆甕鍋釡皆為擊破其雹所至之處樹木屋瓦十不存二三焉夫雹者雨氷也皆隂陽相脅而成左傳曰凡雹冬之愆陽夏之伏隂聖人在上無雹雖有不為災此蓋下民當豐稔收成即便務奢侈以至於服玩衣裝車馬屋宇違越制度撒棄五穀曾無愛惜上天垂誡以懲之爾雉龍郭嚂者忘其名以其語聲高大因謂之曰嚂本成都豪族不事生業唯好畜鷹鷂常募能以鷹犬從禽獸者為伍焉雍熙中將鷹犬獵于學射山鷹拏一雄雉救之得活其雉每足有二距徒侣皆異之以巾包而負之覺其漸暖行一里間如火倣徨間俄而隂晦乃風雷震雹林木擺簸不知所歸遂棄雉於澗下奔及至真觀避之時雨如注中宵方霽不勝其驚因爾時有范處士者聞其説即云雉者龍也龍為五蟲之長無定形寄居十二位為雞豬牛馬之屬斯龍為雉服也自貽其患茍無風雨之變亦難逃鼎俎爾李老袁氏不記名人皆目為袁野人嘗居廣都縣莊時盛暑有一老人衣白詣袁莊求見袁及席謂袁曰某李氏家於此縣之南特來有託於君子願君憫宥當有厚酬袁亦不甚諾之但寬勉而已且留食水飯醎豉而退復三日因暴雨溪漲莊民舉網獲一鯉魚可三尺許鱗鬛如金撥剌不已袁呼童就機割之腹有飯及鹹豉少許袁因悟李老者魚也且曰李老雖靈固難逃吾之一醉爾或云蟲莫智於龍彼魚神龍也若斯變化安有難而難逃哉如是則智有所困神有所不及耶吁迍難困厄凡聖與龍蝽蠕皆一時免與不免何得異哉慈母池慈母池亦云滋茂池去永康軍入山七八十里池水澄明莫測深淺每至秋風搖落未嘗有草木飄泛其上或墜片葉纖芥必有飛禽䘖去之每晴明水面有五色彩如舒錦焉或以木石投之即起黑氣雷電雨雹立至或歲旱祭禱無不尋應休復曾見道門訪龍經水有五色及沙在石上者皆是龍居之處也龍女堂益州城西北隅有龍女祠即開元二十八年長史章仇公兼瓊拔平戎城夢一女曰我此城龍也今棄番陬來歸唐化投問諸巫其言不異尋表為立祠錫號會昌祠在少城舊迹近揚雄故宅每旱潦祈禱無不尋應乾符中燕國公高駢築羅城收龍祠在城內工徒設板至此驟有風雨朝成夕敗以聞於高公公亦夢龍女曰某是西山龍母池龍君今築城請將某祠置於門外所冀便於往來公夢中許之及覺遂令隔其祠於城外而重葺之風雨乃止城不復壞焉繼之王孟二主甚嚴飾之祈禱感應封睿聖夫人天禧己未歲自九月不雨至庚申歲二月寺觀諸廟祈禱寂無影響知州諫大夫趙公稹躬詣其祠冥禱未至郡甘澤大澍達旦屬邑皆告足是歲豐登民無札瘥遂奏章新其祠宇焉茅亭客話卷五
