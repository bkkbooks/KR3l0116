body:
  text: 茅亭客話卷七宋黃休復撰哀亡友辭咸平庚子歳正元日神衞卒殺主將竊據益郡四月天軍來討至城下賊拒天軍驅脇老幼以乗城天軍譟以環城晝夜攻擊城内死傷且甚其賊求取供須器用錢帛珠金民不聊生九月二十日大軍入城賊衆宵遁主帥念其城中民庶備厯艱危慮玉石俱焚遂使招誘出城安撫之初城内百姓為賊據城皆擕挈老幼出城投村墅逃避者十六七焉有出城却被軍賊搜捉縲繫入城誅戮者有役於城上犯其暴法者有窮於輸給遭其毒酷者有脇而不從為其殺害及受檟楚者有痛心疾首憂鬱憤悶成疾而死者有與賊為伍獻謀附勢扼喉撞心取其賄賂者有終日逃避以至城陷竟不覩賊鋒者夫如是者命非天耶天非命耶前進士張及有哀亡友楊錫辭前進士彭乗有郝逢傳今具其事跡及録其辭傳非止楊錫郝逢而已庶後之人覽之得無傷嘆叛君殘民之事者是哉哀亡友辭序云亡友楊錫字孝隆誠至之士也昔與趙郡李畋蜀郡任玠南陽張逵洎及結文學友咸治經義於樂安先生悉潛心於六教然後觀史傳遍百家之說探奥索微取其貫於道者旣積中而發外遂下筆楮文其譔論考賢士節夫之動靜明古人沿習之廢置紀績義之大小辨適用之邪正不虛美不𨼆惡庶達乎心志之所冀也日執是道以出身入仕俾其抱策書而不愧怍持言行以符㑹同十五年未始一日而忘此也亡友居吾羣中尤為靜退者葢不徒為進以希名茍譽速售其身誠俟乎鄉賢里能拜書獻于春官氏不幸去歳盜賊竊據城邑亡友即日憂懣成疾莫能逺遁及復避地於西山不得亡友言别每念跡雖離而心同室在逺而人邇意其與終合而成前志也至王師討平凶醜我雖歸正友則憤極而死矣冡嗣始孺又且夭矣嗚呼亡友業已著志未伸命何艱而至此身既没而嗣亡地仍僻而知寡彼蒼何司使輔善疾惡者罹戾若是之甚耶願表其懿行録其遺文同三友入關示儒林豪傑必推而知之少贖永恨今姑為辭舒交情之悲爾曰予取來之得朋兮接羣居之及義不殞穫於貧賤兮恥喧呶於聲利炳舊史之逺目兮飫六經之正味議班紀之九流兮廣劉書之七志旣積中之發外兮幸入官以莅事將結綬之彈冠兮匪君翔之于墜何賊卒之妖興兮據藩服之城壘君豈適逺之無所兮奈病來之難起我徂西山兮不與子别或出處兮其心曷異擾攘之長然誠㑹合之密邇洎王師之討平兮聞吾友之已矣燕雀啁啾兮遼鶴幽病豺狼噬囓兮騶虞憤死嗟慶緒之不續兮復嗣子之隨躓徒呼天之云亡故使其秀疾而神駛志願表其文行兮示廣場之豪士異知子之若然兮俾徳之無愧今空抑哀以摛辭兮報亡友之終始郝逢傳郝逢字致堯成都人幼好學攻詩性柔而惰或謂其性懦非能立事常欲求鄉薦未竟屬盜起於境資産略盡迫寒餒而無憂嘆咸平中蜀掌兵者失律兵亂為賊盜殺守臣而據郡自春徂秋驅老幼以守城或獻謀於賊令盡索郡中書生署職俾立効凡得數十輩列兵而脇曰不從者即此誅戮仍及其族皆震懾而從逢前紿賊帥曰念所索儒士某非儒豈可徼禄不能從命詞氣剛憤不可屈抗賊怒令引去臨刃復召者三詞皆如初㑹解於賊檟楚而釋之既獲免遂匿於家天兵至逆黨殱夷或聞於郡守將上其事而中止逢亦不復言居貧自若噫當是時有位者尚或茍命而逢一士爾能致命賊所不陷非義彼同禄衒勢私於身以媚時得無愧乎逢貧處晦跡混於俗而人不甚知噫人名存誠豈易知乎逢居州里皆以為怯懦洎亂而能爾始明其所履焉是時無他慮也去就而已去為順就為逆去難而就易能為其所難志以守正是亦㡬乎智勇也夫忠烈節義何時無之然時於無聞在遇不遇爾使越石父不遇晏子則一拘囚爾聶政非其姊則無名暴夫爾其遇千金之重不遇鴻毛之微然不可欲其遇而始為也謂不遇而不為也蘭生深林不以無人而不芳君子不以困窮而改節茍有善雖不我知斯善矣豈止蒙其慶乎茍不善雖不我知斯惡矣豈止罹其殃乎易曰井渫不食為我心惻王明並受其福又曰何校滅耳凶其是之謂乎若逢所履雖曰未聞吾必謂之聞矣故為聲其實亦得有所勸焉陳季和偽蜀進士陳熙載字季和文學之外書畫之尤者皆閱而識之郡中好事之家所寶藏者多經其目真僞無所逃焉受均賊署配連州歳餘或有鄉人西來因寓書云某在家日於某處埋一鐵投壺瓶實以銅錢書若到家可使令掘之既而書至遂於所言處掘得一鐡投壺瓶其中唯見一龜纔容壺腹之内無能出之翌日取看即不見龜但空壺而已夫物之所化史傳尤多不可以智達也鬻屨嫗庚子歳益部軍賊據城大軍在北門外劚起洞子近城攻擊矢石如雨中垻街有王嫗年七十餘孫兒十四五歳為賊驅之守城嫗日自送食飲忽一日賊集諸妓樂於瓦屋禪院門嫗倚樹坐看一賊直來嫗前背身箕踞嫗叱之不去仍惡詈之其人如不聞嫗忿然退身須臾城外一砲飛空而落傍擊此賊頭碎于地如無此賊則嫗正中之也城陷日唯殘嫗一身今九十餘既老且病凍餓切骨織草屨自給常告人云城閉之日若遭砲石擊殺不見今日貧苦何不幸若此耶夫死生有命子夏言人不爾逾也凡人貴賤貧冨遭逢禍福有幸與不幸顔子少亡子曰不幸短命之稱為不幸則知長命焉幸也鬻屨嫗貧而壽嘆為不幸惜哉盲女庚子歳天兵討益部賊突圍宵遁主帥愍城中民使招誘出城大軍方入搜捕及平定後盡令歸家南市渠中有一盲女年七八歳呌云父耶母耶兄耶嫂耶何處去不供給我飲食也其盲女為饑渴所逼不知無家但怨呼父母兄嫂旦夕不輟有一鄰婦云此孫氏女三歳因患麩豆入眼父母憐其聰慧常教念佛書鞠養甚厚父死於輸給不迨母死於憂憤嫂因供給役夫中流矢而斃兄城陷而不知存亡更無親戚觀者痛心流涕經旬或遇鄰婦問盲女存亡鄰婦云盲女不接他人飲食但悲號呼呌其親水飲不入口蘇而復絶七日而卒因憫而拾餘燼之材而焚之於盲女衣中獲白金一兩遂鬻之以供僧畫像焉嗚呼城陷日似此者多矣獨書盲女者言惟鄙意有激焉夫家冨財饒則禮義興矣財茍不足則禮義俱廢葢人之常情也當是時也民家財物罄空窘迫尤甚豈謂鄰婦獨能捨餘燼之材焚燒盲女復於女衣中獲金不為己用與盲女供僧畫像竒哉鄰婦能於困窮窘迫之際存誠如是故特書之且今之見利忘義者不為斯鄰婦之罪人乎鐵骨魚于生名𤣥字𤣥之成都人也庚子歳遇賊據城謂愚曰某家事事可以不顧所寶唯一刀爾開房令愚視之於昬黑處見光芒丈餘細辨之乃刀也因問所得之處云某故父於僞蜀制誥賈舍人下及第是年冬遊青城迴至溫江縣泛舟而歸見百花潭側漁人釣獲鯉魚一雙長尺餘買之歸家時當寒沍煖酒炙魚且禦凝冽食魚棄骨侍婢云一魚骨黑乃鐵也使匠辨之真鐵爾遂煉成此刀今遭厄難陷在賊中城破之日刀與人孰存此刀先喪吾亦喪矣吾若先喪不知刀歸誰氏此刀非常冝見賞他日為吾善誌之于生於賊中憂憤而卒城陷日家遭焚掠其刀果不知存亡因敘其言以記之茅亭客話卷七
