body:
  text: 茅亭客話卷八宋黄休復撰瑞牡丹大中祥符辛亥春知益州樞密直學士任公中正張筵賞花於大慈精舍時有州民王氏獻一合歡牡丹任公即圖之時士庶觀者闐咽竟日且西蜀自李唐之後未有此花凡圖畫者唯名洛州花考諸舊說謂之木芍藥牡丹之號葢出於天寶初按酉陽雜俎云隋朝文士集中無牡丹歌詩又隋朝種植法之十卷亦無牡丹者至僞蜀王氏自京洛及梁洋間移植廣開池沼創立臺榭竒異花木恠石修竹無所不有署其苑曰宣華其公相勲臣競起第宅窮極奢麗時元舅徐延瓊新創一宅雕峻奢壯花木畢有唯無牡丹或聞秦州董城村僧院有紅牡丹一樹遂賂金帛令取之掘土方丈盛以木匣厯三千里至蜀植于新宅花開日少主臨幸歎其屋宇華麗壯侔宫苑命筆書孟字於柱上俗謂孟為不堪明年後唐吊伐孟知祥自太原馳赴蜀即知其先兆矣乎僞通政王宗裕亦於北門清逺江東創一亭臺榭池塘駢植花竹泉石縈遶流盃九曲為當時之甲也唯牡丹花初開一朶王與諸親屬擕妓樂張宴賞其初開者花已為一女妓所折王怒欲誅之其妻諫曰此妓善琵琶可令於堦前執樂就賞王怒稍解其難得也如此至孟氏於宣華苑廣加栽植名之曰牡丹花外有麗春與黎州所有者小不同爾寓孔雀書愚友人左侍禁辛貽顯為容宜廉白等州巡檢因寄一孔雀雛西南相去萬里蜀人固未嘗覩之誠可愛也書云所屬郡邑山中多孔雀焉雌者尾短無金翠雄者尾大而緑光翠奪目孔雀自愛其尾欲栖息必先擇致尾之地南人捕者先施網罟須俟甚雨尾霑而重不能高翔初為所擒則雀欲展其翅恐傷其尾至死尚愛護之土人有活取其尾者持刃於叢篁幽閴處藏蔽其身伺其過則急斷其尾者不急斷迴首一顧即金彩無復光翠故生者為貴也為婦人首飾及扇拂之𩔖或生擒獲者餉饋如京洛間鵞雁以充口腹其味亦如之南海有一士人嘗養一隻僕夫告云蛇盤孔雀且恐毒死士人急令救之其僕迴但笑而已士人怒之其僕告曰蛇與孔雀偶有得其卵者使雞抱伏即成其名曰都䕶初年生緑毛二年生尾生小火眼三年生大火眼其尾乃成矣孔雀每至晴明軒翥其尾自迴顧視之謂之朝尾須以一間房前開牕牖面向明方東西照映向裏横一木架令栖息其性愛向明不在地止泊飼之以米榖豆麥勿令闕水與養雞無異每至秋夏令僕夫於田野中拾螽斯蟋蟀活蟲餵飼之凡欲餧飼引於㕔事上令慣見賔客又盛夏或患眼痛可以鵞翎筒子灌少生油以新汲水洗之如眼不開則擘口餤之小魚鰕不爾餓損及切蒻少許餤之貴其凉冷如食有餘則愈切不可與鹹酸物食食則減精神昬暗毛色馴養頗久見婦女童豎綵衣綬帶必逐而啄之或芳時好景聞絲竹歌吹之聲必舒張翅尾眄睞而舞若有意焉滕處士滕處士昌祐字勝華攻書畫今大聖慈寺文殊閣普賢閣天花瑞像額處士筆蹟也畫花竹鳥獸體物像形功妙格品具名畫録處士所居州東北隅竹樹交隂景象幽寂有園圃池亭徧蒔花菓凡壅培種植皆有方法及以藥苗為蔬藥粉為饌年八十五書畫未嘗輟焉㕔壁懸一大粉板題園中花草品格名目者百餘件亦有逺方恠草竒花葢欲資其畫藝爾園中有一杮樹夏中團坐十餘人敷張如盖無暑氣云杮有七絶頗宜種之一有壽二多隂三無禽窠四無蟲蠧五有嘉實六本固七霜葉紅而堪翫有一盆池云初埋大盆致細土拌細切生葱酒糟各少許深二尺餘以水漬之候春初掘取藕根麄者和顚三節已上四五莖傷損埋入深泥令近盆底纔及春分葉生當年有花夫藕有四美根為菜花為翫實為果葉為杓具此四美池沼亭檻之前為瑞草萍蘋藻荇不得與侔也園中有慈竹藂生根不離母故名之慈也有釣絲竹以其弱杪低而垂至地也有絲竹葉細而青莖瘦而紫亦謂之墨竹有對青竹身黄色有一脈青節節相對故謂之對青也有苦竹葉穠多隂笋高之時粉香籜翠有柱竹扶疎藂茂瀟洒亭臺無出此數君也俗以五月十三日種竹多遭烈日晒乾園中竹以八月社前後是月天色多隂土潤竹以此月行根也凡欲移竹先掘地坑令寛大以水調細土作稀泥即掘竹四面鑿斷大根科連根以繩錮定舁時勿令動著根鬚間土舁入坑致泥漿中令泥漿周匝徧滿乃東西揺之復南北揺之令泥漿入至鬚間便以細土覆之勿令土壅過竹本根也若竹稍長者芟去顚葉纏竹架之恐風揺動即死每窠相去二尺餘不須實斸只以一脚踏之來年生笋速也宜於園東北軟土上種之竹性多西南行根不用頻澆水水多則肥死園中有梨名車轂圍一尺摘時先以布囊盛之落地即碎有金桃深黄剖之至核紅翠如金味美為桃之最也有林檎色如玉向陽處有朱㸃如纈顆有重四兩者其栽果法以冬至後立春前斫美果直枝須有鶴膝大如母指者長可二尺以來劄於芋魁中掘土令寛調泥漿細切生葱一升許攪於泥中將芋塊致泥中以細土覆之勿令堅實即當年有花來年始實絶勝種核接果樹法凡欲接果先得野樹子酸澁不美者如臂已上皆堪接也然後尋美果枝𨕖隔年有鶴膝向陽者枝長不過二尺過則難治至時剪下便劄於蘿蔔中欲不洩其氣也冬至後十日立春前七日其野樹皮潤萌芽未發是其時也將野樹以鋸截人去地五七寸中心劈破深二寸許取美枝或一枝或兩枝斜􅧠勿傷其皮插於野樹罅中外與野樹皮相齊等緊密用牛糞泥封之與笋籜包裹其接處以麻紉纏定上更以黄土泥塔頭裹之勿使雨水透入或有野樹旁生芽葉即取去之若依此法則當年有花必矣休復嘗依其教而樹樹皆成則不喻其野樹子實酸澁鶴膝枝甜美接酸澁樹上為酸澁之氣所推又焉得遂於甜美耶樹之元氣反不能推小枝而與之俱酸澁何也所謂本不勝末而物性難解歟今之人但廕其枝葉食其美實而不求其酸澁所推耶好畫虎靈池縣洛帶村民郝二者不記名嘗說某祖父以醫卜為業其四逺村邑請召曾無少暇畫一孫真人從以赤虎懸于縣市卜肆中已數歳因及耄年每日顒坐瞠目觀畫虎終日無倦自茲不見畫虎則不樂孫兒輩將豆麥入城貨賣收市鹽酪如不協其意則怒而詬罵以至杖撻之若見畫虎則都忘前事人有召其毉療至彼家見有畫虎即為之精志親戚往還亦只以畫虎圖幛為餉遺之物如是不數年間村舍㕔厨寢室懸掛畫虎皆遍鄉黨皆為畫虎所惑有從兄見其耽好恠而責之曰汝好此物何謂乎答云常患心緒煩亂見之則稍間焉因是說府城有藥肆養一活虎曾見之乎曰未也因拜告其兄求偕至郡旣見後頓忘寢食旬餘方誘得歸自茲一月入城看虎再三矣經年唯好食肉以熟肉不快其意即啖生肉凡一食或猪頭或猪膊食之如梨棗焉如是兒孫輩皆恐怯每入城看活虎孫兒相尋見則以杖擊迴至孟蜀先主建僞號之明年或一日夜分開莊門出去杳無蹤跡有行人說夜來一虎跳入羊馬城内城門為之不開半日得軍人上城射殺分而食之其祖父不歸絶無耗音則化為虎者是也遂訪諸得虎肉食者獲虎骨數塊將歸葬之葭萌二客僞蜀末利州路有二客負販襍貨往葭萌市鬻之山程巇嶮竹樹荒涼時雨初霽日將暮去市十五里餘藂林高樹上有人云虎過溪來行人迴避二客惶忙𨕖得一樹髙枝葉蔽人形處登之逡巡有二虎迭來攫躍或作人聲曰人在樹上一虎曰我須上樹取之虎欲相及二客悸慄以拄杖摏之虎呌曰刺著我眼遂下樹號呼而逸至曙行人稍集遂下樹赴葭萌市征之所有一婦報云任攔頭夜來醉歸刺損雙眼不來檢稅二客相顧私語衆怪而問之因說夜來以拄杖摏損虎眼是斯人偽為虎劫路耶衆言比處近有二虎且暴四逺村莊犬彘駒犢殆將食盡市人遂相率持杖往攔頭家驗之纔及中路遇一虎虎畏人多惶怖奔逃越山哮吼而去衆至任攔頭家窺其籬隙之内但見攔頭倮形而坐兩目流血呻吟不已衆乃叱之以杖擊笆籬其攔頭驚忙踉蹌曵一尾突門而出目無所見撞落深坑吼怒拏攫為衆人棒及大石斃之遂舁入市向先見之虎即攔頭妻也休復見史傳人化為猿為魚為鱉為龜為蛇為虎之𩔖甚多不可以智詰之矣虎化為僧武都人姓徐失其名以商賈為業開寶初往巴逢興販其路危狹猿徑鳥道人烟杜絶猛獸羣行村甿皆於細路中設檻穽以捕之為常矣時徐至一村安泊中夜報云機發村人炬火照之見一老僧困憊在穽中自陳曰夜來入村教化迴誤落穽中望諸檀越慈悲解救村甿輩共愍開檻而出之躍跳數十成一巨虎奮迅騰躑而逝斯畜也以人言誘喻村甿得脫其難亦智矣李吹口永康軍太平興國中虎暴失蹤誤入市市人千餘呌譟逐之虎為人逼弭耳矚目而坐或一怒則跳身咆哮市人皆顛沛長吏追善捕獵者李吹口失其名衆云李吹口至矣虎聞忙然竄入市屋下匿身李遂以㦸刺之仍以短刃刺虎心前取血升餘飲之休復雍熙二年成都遇李因問向來飲虎血何也李云飲其血以壯吾志也又云虎有威如一字長三寸許在脇兩傍皮下取得佩之臨官而能威衆無官佩之無憎疾者凡虎視只以一目放光一目看物獵人捕得記其頭藉之處須至月黑掘之尺餘方得如石子色琥珀狀此是虎目精魄淪入地而成琥珀之稱因此主療小兒驚癎之疾凡虎鬚拔得者將劄蚛牙無復疼痛凡虎傷者人衣服器杖乃至巾鞋皆摺疊置於地上倮而復僵葢虎能役使所殺者人魂也凡為虎傷死及溺水死者魂曰倀鬼凡月暈虎必交也凡虎食狗必醉狗虎之酒也凡虎不傷醉人頃有一村夫入市醉歸臨崖而睡有虎來嗅之虎鬚偶入醉者鼻中醉者大噴嚏其聲且震虎驚躍落崖而斃此事皆聞李吹口者茅亭客話卷八
