body:
  text: 茅亭客話卷十宋黃休復撰孫處士孫處士名知微字太古眉州彭山人也因師益部攻水墨僧令宗俗姓丘氏知微形貌山野為性介潔凡欲圖畫道釋尊像則精心率意虛神靜思不茹葷飲酒多在山觀村院終冬夏方能周就嘗寓青城白侯壩趙村愛其水竹重深囂塵不入冀絶外慮得專藝學知微畫思遲澀無羈束有位者或求之不動即絶食託疾而遁導江縣有一女巫人皆肅敬能逆知人事知微素尚竒異嘗問其鬼神形狀欲資其畫女巫曰鬼有數等有福德者精神俊爽而自與人交言若是薄相者氣劣神悴假某傳言皆在乎一時之所遇非某能知之也今與求一鬼請處士親問之知微曰鬼何所求女巫曰今道途人鬼各半人自不能辨之知微曰嘗聞人死為冥官追捕案籍罪福有生天者有生為人者有生為畜者有受罪苦經劫者今聞世間人鬼各半得非謬乎女巫曰不然冥途與人世無異茍或平生不為不道事行無過詎有桎梏及身者乎今見有王三郎在冥中足知鬼神之事處士有疑請自問之知微曰敢問三即鬼神形狀欲資所畫俄有應者曰今之所問形狀醜惡怪異之者皆是魍魎輩神者一如陽間尊貴大臣體貌魁梧氣岸高邁蓋魂魄强盛是以有精爽至於神明非同淫厲之鬼爾知微曰鬼神形狀已得知矣敢問鬼神何以侵害於生人應者曰鬼神之事人皆不知凡鬼神必不能無故侵害生人或有侵害者恐是土木之精千歲異物血食之妖鬼也此物猶人間之盜賊若無故侵害生人偶聞於神明必加侵害亦不異盜賊之抵干憲法爾若人為鬼所害者不聞乎為惡於𨼆者鬼得而誅之為惡於顯者人得而誅之乎知微曰明神禱之而求福有之乎應者曰鬼神非人實親於德是依皇天無親亦惟德而是輔凡有德者不假禱祈神自福之若素無德行雖勤禱之得福鮮矣知微曰今冥中所重者罪在是何等應者曰殺生與負心爾所景奉者浮圖教也知微曰某之後事可得聞乎應者曰禍福之事不可前告神道幽祕弗許預知也知微曰今欲酬君君欲希我何物應者曰望君濟我資鏹數百千貫知微辭之應者曰所求者非世間銅鐵為者乃楮貨爾知微乃許之應者曰燒時慎勿使著地可以薪草薦籍之向一處以火爇不得攪剔其錢則不破碎一一可達也遂依教蟠紙錢數百千貫噫昔漢世以前未知幽冥以何為賂遺之物爾黃處士黃處士名延矩字垂範眉陽人也少為僧性僻而簡常言家習正聲自唐以來待詔金門父隨僖宗入蜀至某四世矣琴最盛於蜀製斫者數家惟雷氏而已又云雷氏之琴不必盡善有瑟瑟徽者為上金玉者為次螺蚌者亦又次焉所以為異者嶽雖髙而絃低雖低而不拍面按之若指下無絃吟振之則有餘韻非雷氏者箏聲絶無琴韻也處士常言隋文帝子蜀玉秀造千面琴散在人間故有號寒玉韻磬響泉和志者琴則有操引曲調及弄絃則有歌詩五曲一曰伐檀二曰鹿鳴三曰騶虞四曰鵲巢五曰白駒蓋取諸國風雅頌之詩聲其章句以律和之之謂也非歌詩之言則無以成其調也本詩之言而成調非因調以成言也諸詩皆可歌也咸平中知州馮公知節召孫知微畫俾處士彈琴二公俱止僧舍嘗㑹愚茅亭進士張及贈之詩曰二公髙節厭喧卑同寄蕭宫共展眉玉樹氷壺齊品格野雲臯鶴本追隨泉流指下何人賞嶽峭毫端秖自知綣戀賢侯美風教故山歸去尚遲遲祥符壬子秋告歸鄉里遺愚養和一法是年冬病卒年八十其樂天知命者歟程先生程先生名賁字季長自號丘園子江陽人也世習儒少孤力學立身介潔跬步一言必循禮則雖家童稚子應對進退不踰規矩先生尤嗜酒復喜藏書自經史子集之外凡竒訣要録未嘗聞於人者畢珍收之亦多手寫焉其間復混以名畫古琴瑰異雅逸之玩無所不有雖年齒已暮而志好益堅目游簡編未少暫息每謂所知者曰余五十年簡冊鉛槧未嘗離手其勤至也如此嘗撰太𤣥經義訓功未就寢疾而卒年七十有四易曰不事王侯高尚其事其是之謂乎杜大舉杜鼎升字大舉形氣清秀雅有古人之風鬻書自給夫婦皆八十餘每遇芳時好景出郊選勝偕行人皆羡其高年逸樂如是進士張及贈之詩曰家本樊川老蜀都世家冠劒豈寒儒筆耕尚可儲三載酒戰猶能敵百夫僻愛舜琴湘水弄每縣孫畫醉仙圖孟光笑語長相逐喚作梁鴻得也無嘗手寫孫思邈千金方鬻之凡借本校勘有縫折蠧損之處必粘背而歸之或彼此有錯誤之處則書劄改正而歸之且曰使人臣知方則忠使人子知方則孝自於千金方中得服玉泉之道行之二十年獲筋體强壯耳目聰鑒每寫文字無㸃竄之誤至卒方始閣筆服玉泉法去三尸堅齒髮除百病玉泉者舌下兩脈津液是也但能每旦起坐瞑目絶慮叩齒二七通潄令滿口乃吞之以意送至臍下氣海一七遍經久自然如流水瀝瀝下坎澗之聲如此則百脈和暢所以黃庭經云玉池精水灌靈根又曰漱咽靈液災不干其是之謂乎任先生任先生名玠字溫如蜀人也學識廣博人皆師仰之大中祥符初樂安公中正鎮蜀日請先生於文翁石室大集生徒講說六經以紹文翁之化由是蜀中儒士成林矣大中祥符末有諫議大夫凌公策蒞蜀聞先生之名表薦于上詔入京先生進龍圖紀聖詩一千韻酬以汝州團練推官三讓辭官表云伏念臣早年髮白悲老態之遽臻觸事心闌覺死期之將至乞授一子官蒙聖恩與子偕任醴泉主簿天禧元年欲就居嵩山般家之蜀因與鄉人前秦州隴城主簿張逵中行秩滿歸川二人同訪愚茅亭觀舊題之處云昔日髙年有道之士今已物故未逾一紀故友將盡我雖存也餘生幾何先生留一絶於亭壁云聚散榮枯一夢中西歸親友半成空唯餘大𨼆茅亭客垂白論交有古風天禧二年先生遊寧州卒于旅舍揚子法言曰通天地人曰儒誠哉是言天地間萬類中惟人最靈然愚蒙者萬而賢智者一處賢智而志於道者復幾何人如任先生者可謂通天地人而知命守道者也談居士談居士名仁顯成都人也以醫為事居郡城東南隅所居庭廡籬落間遍值草藥年髙而精神愈壯無喜怒故毁譽不能動其心手持數珠常誦佛經於閭巷聚落中治病所得錢帛隨即分授於貧者竟以不言但行隂施默益之道每行藥至午方歸則閉户靠壁瞑目而坐大中祥符乙卯冬示疾端坐而逝時齒一百人未化前人問居士有長生法對曰至於導養得理以盡性命百年猶厭其多況久生之苦乎小童處士童處士名益字友賢因兄能畫相學習而頓悟若生而知之大凡性有巧拙畫無古今蜀末歸命聖宋以前有張杜二人善畫佛像羅漢有張南本畫人物車馬黃伯鸞花雀竹石李升山水李文秀寫真自往及今有童君與前輩不相下也童君於海雲山寺畫慈寺如來十六羅漢大聖慈寺三學院楞嚴經變相玉局化龍虎君二十四化神仙天慶觀龍虎君聖祖殿嶽瀆神祗所有神仙侍從向背低昻無遺其勢者鳥獸洪纖樹石山水無遁其形者而又筆蹤遒健天機俊逸九曜院寫張侍郎真精神氣韻如出素壁之前時推妙手張侍郎在任日俾童君畫鮑倩五禽圖於五勢之間各寫侍郎真在其中侍郎展開曰老夫山野豈堪圖之因是優禮待之祥符中於愚茅亭圖水石六堵謂愚曰時輩皆云彈琴非是樂寫真非是畫是耶非耶請為言之愚對曰春秋左氏傳晉侯觀于軍府見鍾儀問曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也能樂乎對曰先父之職官也敢有二事使與之琴操南風杜預注云伶人樂官也豈不謂琴為樂乎南齊謝赫論畫有六法一曰氣韻生動二曰骨法用筆三曰應物像形四曰隨類傳彩五曰經營位置六曰傳移模寫其寫真者於畫六法中一法爾豈不謂之畫乎若秪以畫人頭面而已豈曰盡善若秪以寫真擅名不亦寡乎譬諸膳夫和羮醯醢鹽梅以烹魚肉齊之以味闕一不可今國朝取士於詩賦策論闕一者不中其選也則知君子之道貴乎全也畫與學雖殊功用奚異君其全和童曰益雖不敏請事斯語矣茅亭客話卷十
