body:
  text: 茅亭客話卷三宋黄休復撰淘沙子僞蜀大東市有養病院凡乞丐貧病者皆得居之中有攜畚鍤日循街坊溝渠内淘泥沙時獲碎銅鐵及諸物以給口食人呼為淘沙子焉辛酉歳有𨼆迹于淘沙者不知所從來及名氏常戴故㡌擕鐵把竹畚多於寺觀閴靜處坐臥進士文谷因下第往聖興寺訪相識僧見淘沙子披褐於佛殿上坐谷見其狀貌古峭辭韻清越以禮接之因念谷新吟者詩數首谷愕然又諷其自作者數篇其詩或譏諷時態或警勵流俗或說神仙之事谷莫之測因問谷今將何往谷曰謁此寺相識僧求少紙筆之資别謀投獻其人於懷内探一布囊中有麻繩貫數小鋌銀遂解一鋌遺谷戴㡌將所擕器長揖出寺而去谷後得僞通奏使王昭逺禮於賔席因話及感遇淘沙子之事念其詩曰九重城裏人中貴五等諸侯閫外尊爭似布衣雲水客不將名字掛乾坤王公曰有此異人遂聞于蜀主因令内園子於諸街坊尋訪之時東市國清寺街有民宇文氏宅門有大桐樹淘沙子休息樹隂下宇文頗留心至道見其人容質有異遂延于㕔問其藝業云某攻書嗜酒言論非俗因飲之數爵與約再㑹浹旬淘沙子或到其門將破㡌等寄與門僕令報主人其僕忿然厲聲罵之曰主人豈見此等貧兒耶宇文聞之遽出迎候愧謝曰翹望日久何來晩耶即與飲且酣宇文曰神仙可致乎至道可求乎淘沙子曰得之在心失之亦心宇文曰某數年前遇人教令嚥氣未得其驗廢之已久淘沙子曰修道如初得道有餘皆是初勤而中惰前功將棄之矣世有黃白有之乎好之乎宇文曰某雖未嘗留心安敢言不有安敢言好之淘沙子因索銅錢十文衣帶中解丹一粒醋浸塗之燒成白金此則神仙之藝不可厚誣之但罕遇也有自言者皆妄也遽辭而去翌日凌晨扣門將一新手帕裹一物云淘沙子寄與主人宇文開而觀之乃髻髪一顆莫測其由至日高門僕不來令召之云今早五更睡中被人截却頭髻將去蜀主聞之訪於宇文宇文尋於養病院云今早出去不歸自茲無復影響休復見道書云刺客者得𨼆形之法也言刺客若死屍亦不見每二十年一度易形改名姓謂之脫難多有奇怪之事名籍已係地仙淘沙子是其流也張道者僞蜀大東門外有妙圓塔院僧名行勤俗姓張氏人以其精於修行因謂之道者早歳南行中年駐錫龎眉皓髪貌古形羸住草屋數間唯繩牀一張及木棺一所不從齋請晝則昇牀而坐夜則入棺而卧衣服未嘗更換人問之拱黙不對人皆仰其高節遺之衣服則轉施貧人與米麫鹽酪則受以一大瓶貯之常滿每齋則取一抄合而食三紀偃息自若不誑流俗其清尚如此時齒八十臨終自拾薪草積於院後告諸門徒曰吾即日行化希以木棺置於薪草之上以火爇之老僧幸矣至期依其教諭于煨燼中得舍利數十粒葬於塔中時有慈覺長老禪門宗匠也有書妙圓塔院張道者屋壁云成都有一張道者五十年來住村野秖將淡薄作家風未省承迎相茍且南地禪宗盡徧參西蜀叢林遊已罷深知大藏是解粘不把三乘定真假張道者傍沙溪居蘭若草作衣裳茅作舍活計生涯一物無免被外人來借借寅齋午睡樂咍咍檀越供須都不謝沿身不直五分銅一句𤣥𤣥豈論價張道者貌古神清不可畫鶴性雲情本自然生死無心全不怕總逢刼火未為災暗裡龍神應嘆訝張道者不說禪不答話葢為人心難誘化盡奔名利漫驅驅箇箇何曾有般若分明與說速休心供家却道也爛也張道者不聚徒甚脫洒不結逺公白蓮社心似秋潭月一輪何用聲名播天下大覺禪師禪師名慈覺字法天姓劉氏自王蜀末遊南方至孟蜀初歸住大覺禪師性急言速應答如流人問一部蓮經何者是妙法師㦸其手曰教汝鼻塌問爲甚如此對曰謗斯經故獲罪如是僞蜀李相炅嘗問道於師優禮待之師有禪客須知集禪宗祖裔圖闡道歌行偈頌三百餘篇題曰禪宗至道集行于世張平雲張居士名嶠字平雲學釋氏法人謂之居士時有勾居士問不拘生死者願師直指答云非干日月照晝夜自分明又問百億往來非指的光明終不礙山河時如何答云紅尾漫揺三尺浪真龍透石本無踪嘗撰叅𤣥録𤣥珠集歌行句偈百餘篇云毳流來問我家風我道玲瓏處處通頃刻萬邦皆徧到途中曽未見人逢其仙化三日口吐氣滿屋氛氲有弟子告云居士常言宗門秪以眼目為先不以睡相為事居士今日何以如此言訖香氣乃絶王居士居士王裕四十餘年留心禪學三蜀叢林皆盡叅徧學流與之切磋話句無逃其確論爾至暮年示疾於同流曰吾期某日行化至期居士有季父為僧語之曰吾為汝作十念居士曰透滿無形十方無礙直至無心未得為了何況有念者哉言訖奄然而逝勾居士勾居士名令𤣥蜀都人也宗嗣張平雲有學人問答隨機應響著火蓮集無相寶山論法印傳况道雜言百餘篇有敬禮瓦屋和尚塔偈曰大空無盡刼成塵𤣥步孤高物外人日本國來尋彼岸洞山林下過迷津流流法乳誰無分了了教知我最親一百六十三嵗後方於此塔葬全身瓦屋和尚名能光日本國人也嗣洞山悟本禪師天復年初入蜀僞永泰軍節度使禄䖍扆捨碧雞坊宅為禪院居之至孟蜀長興年末遷化時齒一百六十三故有是句味江山人唐末蜀州青城縣味江山人唐求至性純慤篤好雅道放曠疎逸㡬乎方外之士也每入市騎一青牛至暮醺酣而歸非其𩔖不與之交或吟或咏有所得則將稿撚為丸内於大瓢中二十餘年莫知其數亦不復吟詠其贈送寄别之詩布於人口暮年因卧病索瓢致于江中曰斯文茍不沈沒于水後之人得者方知我苦心耳漂至新渠江口有識者云唐山人詩瓢也探得之已遭漂潤損壞十得其二三凡三十餘篇行于世題鄭處士𨼆居云聞說最清曠及來愁已空數㸃石泉雨一溪霜葉風業在有山處道成無事中酌盡一罇酒病夫顔亦紅贈行如上人云不知名利苦念佛老岷沲衲補雲千片香焚篆一窠戀山人事少怜客道心多日日齋鐘後高懸濾水羅題青城山范賢觀云數里緣山不厭難為尋真訣問黄冠苔鋪翠㸃仙橋滑松織香梢古道寒晝傍緑畦鋤嫩玉夜開紅竈撚新丹鐘聲已斷泉聲在風動瑶花月滿壇贈僧云曾開半偈雪山中貝葉翻時理盡通般若常添持戒力藥叉誰筭念經功雲開曉月應難染海上孤舟自任風長說滿庭花色好一枝紅是一枝空夫艸澤間有𨼆逸得志者以經籍自娯詩酒怡情不耀文彩不揚姓名其趨附茍且得無愧赧唐山人乎蘭亭客序昔晉穆帝永和九年暮春三月三日太原孫綂承公冨春孫綽興公唐漢王彬之道生陳郡謝安石高平郗曇春熙太原王藴叔仁釋支遁道林并逸少子凝之徽之操之等四十有一人修褉之㑹羲之為序興逸而書之筆跡遒媚勁健絶代凡二十八行三百二十四字唐太宗購得其本令趙模韓道政馮承素諸葛貞等摹勒以賜皇太子諸王近臣太宗酷好書法有大王書真蹟三千六百張率以一丈二尺為一軸得一百五十卷太宗自書貞觀二字為印印縫及卷之首尾又𨕖貴臣子弟有性識者以為𢎞文館學生内出書法命之學習焉其有人間善書者並召入館由是十數年間海内靡然工書翰者衆其王書法帖所寶惜者獨蘭亭序為最常置於御座之側朝夕觀覽貞觀二十三年聖躬不豫臨崩謂高宗曰吾欲從汝求一物汝誠孝也豈能違吾心耶汝意如何高宗聴命太宗曰吾欲得蘭亭可將去乎高宗哽噎流涕曰唯命奉諱之日用玉匣貯之隨仙駕送入靈宫今趙模等所摹者本往往有好事者收藏得僞蜀時呉王遣内客省使高弼通好持國書于蜀因獻僞皇太子王羲之石本蘭亭一軸當時識者議此本是羲之撰序後刻石於蘭亭者僞皇太子攻王書體法精妙弼故有是獻僞翰林待詔米道鄰侍書於太子掌書法百餘卷皆是二王法帖古來名賢墨跡及石本者迨聖朝伐蜀其書帖盡歸米道鄰私家至乾徳中有鬻彩牋王七郎名文昌與道鄰世舊道鄰因文昌石本蘭亭即呉使高弼獻太子者文昌好博雅古來名書多收藏之羲之真書樂毅論黄庭經草書十七帖晉魏兩漢至李唐名臣墨蹟及石本皆萃於家當時與往還好書者毛熙震王著勾中正張仁戩黃居實張徳釗張文懿史戴滕昌祐石恪李徳華陳熙載僧懐戩義西嘗訪之閱其所藏終日忘倦太平興國初光禄卿高公保寅即渚宫高氏之後入川為九州巡檢休復嘗謁見之因得張藻山水一軸羲之墨蹟蘭亭一軸注崇山二字圍者乎二字皆是趙模諸葛貞搨者檀香軸古錦標皆煙晦蟲蠧時得與諸賢往復玩之甲午歳家藏書畫焚掠殆盡今蜀中兩經寇亂諸家名書古畫罕得見聞故備言之爾茅亭客話卷三
