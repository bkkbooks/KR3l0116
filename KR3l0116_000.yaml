body:
  text: 茅亭客話小說家類二異聞之屬提要臣等謹案茅亭客話十卷宋黃休復撰休復有益州名畫録已著録是編乃雜録其所見聞始王孟二氏終於宋真宗時皆蜀中軼事無一條旁涉他郡陳振孫書録解題稱其所記多蜀事似未遍檢其書但約略言之也李畋作益州名畫録序稱其通春秋學又稱其鬻丹養親書中李處士一條極論杜預以左傳合經之誤足徴其明於春秋其他論燒煉服餌導引之術臚列道家靈跡者居全書之大半足徴其嫻於丹法餘雖多及神怪而往往借以勸戒在小說之中最為近理其記吳王客省使髙弼以王羲之石本蘭亭一軸獻僞蜀太子當時識者謂是羲之撰序之後刻石蘭亭之本其說為自古録金石者所未聞案賓退録引蔡絛之言曰定武本乃江左所傳晉㑹稽石也其說殆即因此事而附㑹之又記唐德宗疑韋皋有異志隂遣僧行勤誘之餌丹至貞元二十年丹毒發而死亦唐史所不載又記雷琴所以為異者嶽雖髙而絃低雖低而不拍面按之若指下無絃吟振之則有餘韻皆足以廣異聞其駁比夢瑣言所記髙駢鎮蜀時術士王劍換福感寺塔金相輪事謂淳化五年相輪墜地實銅鐵所鑄證孫光憲為誣亦足訂小說之訛也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
