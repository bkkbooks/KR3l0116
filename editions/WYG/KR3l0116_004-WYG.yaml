body:
  text: 茅亭客話卷四宋黃休復撰家居泰僞蜀眉州下方垻民姓家氏名居泰夫妻皆中年唯一男既冠忽患經年羸瘠日加醫藥無復瘳減父母遂䖍誠置千金方一部于所居閣上日夜焚香望峩眉山告孫真人禱乞救䕶經旬餘一夕夫婦同夢白衣老翁云汝男是當生時授父母氣數較少吾今教汝每旦父母各呵氣令汝男開口而嚥之如此三日汝男當愈夫婦覺而皆說符協如一遂㝠心依夢中所教初則骨未始壯次乃能食而行積年諸苦頓愈後冠褐入道常事真人無怠焉周寫貌僞蜀成都人周元裕攻寫貌時因避暑於大聖慈寺佛牙樓下或自長吁傍有一村人詰其吁嘆元裕答云某攻寫真有年矣生平薄命有請召寫真者冨室則不𩔖貧家則酷似母老供給不迨故有是歎村人因問元裕跧泊之處良久曰某有薄土在靈池縣鄰村有觀觀主欲要寫真囑我多時來日詰朝同來相尋勿失此約翌日有一道流白晳長髭來求寫真云夜來隣村門徒話及特來奉謁元裕乃定思援毫立就其貌無少差異道流喜云門外有一僕將少相酬出門呼之已失道流蹤跡逡巡蜀城士庶咸言靈池朱真人來周處士家寫真求請真容者日盈其門自此所獲供侍周贍觀斯靈異得非有道之士出處人間救振貧苦者乎丁元和丁元和者自幼好道不慕聲利疎傲無羈束或晴霽負琴出郭飲酒杖策逍遥於田畝間常言祖父長興元年於遂州值孟先主與東川董太尉㑹兵攻圍州城先是城中有一貧士曰宋自然常於街市乞丐里人不能辨之至重圍中人皆饑殍宋亦餓殕於州市相識者以簟裹埋城下俟時平焚之至明年有遂州驅使吏李彦者先往潞州勾當至城破方歸說見宋自然在潞州告云君若歸州時須與我傳語相識五七家那時甚是勞煩人答以自然於重圍中已死因與發埋處只見空簟其間有一紙文字云心是靈臺神之室口為玉池生玉液常將玉液溉靈臺流利關元滋百脈百脈潤柯葉青葉青柯潤便長生世人不㑹長生藥鍊石燒丹勞爾形元和因是學道深得其用休復嘗讀道書登真𨼆訣云解化之道有八焉解化之法其道隱秘笑道之輩但見狼藉乞丐於㕓市以為口實非其所知然一度託解須歛蹟他方屢更名姓忽逢遇知識露少蹤由以激後人非奉道好奇者孰能採摭其𨼆顯爾王太廟僞蜀成都南米市橋有栁條家酒肆其時皆以當壚者名其酒肆栁條明悟人多狎之偶患沈綿經歳骨立尸居俟死而已有一道士常來貰酒栁條每加懃奉因愍其恭恪乃留丹數粒且云以醻酒債令三日但水吞一粒服盡此丹患當痊矣栁條依教初服一粒疾起能食再服杖而能行終服充盛如初有僞太廟吏王道賔者人皆目王太廟本漢州金堂縣人也因知其事遂懇求栁條取服餘者藥以鐵茶鐺盛水銀投丹煎之須臾水銀化為黄金因是將丹與金呈蜀主云此金為器皿可以辟毒爲玩物可以袪邪若將服餌可以度世蜀主問合丹之法云有草生于三學山中乞宰金堂以便採藥乃授金堂宰明年藥既無成知其得丹於栁條遂誅之休復嘗見道書云未有不修道而希仙藝者苟或得之必招其禍而況謟詐者哉劉長官劉長官名蟾美風姿善談論涉獵史傳好言神仙之事無子息夫妻俱五六十於僞蜀攝成州長道縣主簿聖朝剋復匿於川界貨藥改名抱一開寶中于青城鬼城山上結三間茅屋植果種蔬作終焉之計每一月兩三度入青城縣貨藥市米麫鹽酪歸山由是人稍稍知之或云有黃白法一日有三人冒夜投宿自擕酒果就語及爐火之事頗相契合至夜央語笑方酣客曰知長官有黄白法可以梗槩言之長官初則堅拒客復祈之不已長官笑曰某自數年浪跡從師秪得此法豈可輕道邪客曰某等願於𨼆齋效㸑薪鼓鞴之役可乎長官辭以師授有時他日於丈人真君前相傳爾客作色云今夜須傳勿為等閒長官曰適慕君子同道相逼如此客三人攘臂瞋目眄之良久曰某等非君子是賊也如不得其法必加害於君於腰間探出短刃長官與妻惶懼憚其迫脅而併法兼奉之殘藥三人得之拱揖而去長官夫妻晦爽下山不復再往因以山居與李諶處士休復授道於處士故盡熟其事焉陳損之僞蜀王氏時有郎官陳損之至孟氏朝年已百歳妻亦九十餘當時朝士家有㛰聘筵㑹必請老夫婦以乞年夀為名至蜀末年其夫先死後聖朝剋復至太平興國中老婦猶存僅一百二十歳逺孫息輩住西市造花為業供侍稍給有好事者時往看之形質尫瘦狀若十二三歳小兒短髪皓然顧視外人有同異𩔖寒暑風霜亦不知之休復嘗見神仙傳云人夀有至一百二十歳非因修養而致皆由稟受以得之則老媍是也若因修養及得靈藥餌者壽至二百四十歳加至四百六十歳已上則視聴不衰而無昏耄盡其理者可以不死但不成仙爾夫養夀之道唯不傷而已矣史見魂史見䰟者蜀人也名惟傳年七十餘孑然居數間屋於東市唯以牀座張紙錢而已不知有何法人皆呼之見魂蜀人咸敬之或云判㝠以稱判官有民姓李者嘗敬重之因與偕行至市南勾氏家酒肆前判官望空相揖李因詰之云有水府人吏在此後三日大雨水潦暴漲勾氏出城看水馬驚蹶倒于江中溺死繇是蜀人愈敬之休復見道書真誥云有好隂施奉道敬仙者生授職於隂府則史公其人與史公嘗與相知稱天曹門吏太曦子愚亦聞有生人判㝠者皆懼人知之不敢妄洩此史公又不然何謂乎女先生遂州女道士游氏不記名大平興國末經過成都遊青城及諸仙化儀質古雅喜談至道容貌可二十餘不飲食云得丹砂之妙有一叟髭髪皓然腰脊傴僂執焚香洒埽之役侍於女冠之後常遭叱辱又有張五經道士名道明年過四十亦為女冠侍者云此女冠者百二十歳老侍者乃逺孫爾蜀城士民仰從之至於納貨求丹就師辟穀者如市焉時知府辛諫議仲甫恐其妖遣出城任遊諸化猶有師資者隨行經數年有遂州劉山人到城休復話女冠之事山人笑云秪自那時與張道明于飛至今見住庚除化向來老侍者即女冠之父也嗟乎師問者但存誠敬之為其所欺如稚孺得不戒於所惑乎李聾僧偽蜀廣都縣三聖院僧辭逺姓李氏薄有文學多記誦其師曰思鑿愚夫也辭逺多鄙其師云可惜辭逺作此僧弟子行坐念后土夫人變師止之愈甚全無資禮或一日大呌轉變次空中有人掌其耳遂聵二十餘年至聖朝開寶中住成都義井院有檀越請轉藏經鄰坐僧竊視之卷帙不𩔖乃南華真經爾因與施主言曰今之人好施金帛圖畫佛像意欲思慕古聖賢逺有大功徳及於生民置之墻壁視其形容激勸後人而云獲福愚之甚耶不思古聖賢達皆有言行遺之竹帛一大時教五千餘卷所載粲然已不能自取讀究其修行之理而顧召人看讀亦云獲福益甚愚哉時人謂之僧澄伽勾生益州大聖慈寺開元中興創周迴廊廡皆累朝名畫冠於坤維東廊有維摩居士堂葢有唐李洪度所畫其筆妙絶時值中元日士庶遊寺有三少年俱善音律因至此指天女所合樂云是霓裳羽衣曲第二疊頭第一拍也其中勾生者即云某不愛樂但娶得妻如抱箏天女足矣遂將壁畫者項上搯一片土吞之為戲既而各退歸勾生是夜夢在維摩堂内見一女子明麗絶代光彩溢目引生於牕下狎昵因是每夜忽就生所止或在寺宇中繾綣迨月餘生舅氏范處士者見生神志癡散似為妖氣所侵或云服符藥設醮拜章除之始得生父母頷之其夜天女對生歔欷不自勝曰妾本是帝釋侍者仰思慕不奪君願託以神契君今疑妾妾不可住君亦不必服諸符藥妾亦不欲忘情於衣帶中解玉琴爪一對曰聊為思念之物君宜保愛之自此永訣生捧之無言酬答但彼此嗚咽而已既去生自是日漸羸瘠不逾月而卒玉琴爪其家收得至順冦時方失之壁畫天女至今項上指甲痕尚存焉茅亭客話卷四
