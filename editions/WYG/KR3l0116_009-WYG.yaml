body:
  text: 茅亭客話卷九宋黄休復撰天倉洞醫人張世寧先為僧名法暈師事緜州雲山院僧曉樞者郴人也禪觀之暇頗好燒煉太平興國初令法暈及行者柴漢榮張保緒往昌明縣竇船山採藥入山百餘里巖谷重深松竹蓊翳尋流霞山路至一村曰張野人家老父及嫗皆八十餘既見法暈等語之曰前有天倉洞某為孩孺時有二客去遊言洞中見自然餚􅄿皆可食之汝可去遊唯路徑危峻常宜勉力法暈遂挈火負糧入洞初甚隘嶮後漸高廣迤邐昏黑因執炬而行或上或下凡十餘里漸明與人世無異嵌竇石室廣容石人其下坦平兩畔石壁鍾乳流溢垂下長三四尺時聞鳴籟音韻石牀茶竈相連就之畧憩或覺餒思酸饀食面前尋有一雙酸饀悚惕驚異而食之保緒亦思蒸餅亦如前有之遂食一枚藏一枚柴漢榮思􅁡亦如前得食之後皆忘饑渴漸覺身體輕利登陟無困憊又行三四里阻一大江江傍履蹟果核如有人行過之處對岸有石墻遙望雲霞隱映甍棟樓閣㯶楠花果景象幽竒如宫觀狀微聞鐘磬之韻水急苔滑不敢過乃稽首曰下土微賤形骸滓穢竊入洞府仰窺靈跡是塵刼因緣不敢久住却尋舊徑而迴旣出得洞先藏者蒸餅化為石甚重擊之如銅聲休復嘗見道書云大凡靈山洞府若非道書標記者不可造次遊厯有龍蛇之洞多腥穢鬼神之洞門高濶若神仙之洞隘狹仍須有水隔碍凡人不可妄造之爾鬻龍骨蜀有蠶市每年正月至三月州城及屬縣循環一十五處耆舊相傳古􅁞藂氏為蜀主民無定居隨􅁞藂所在致市居此之遺風也又􅁞將興以為名也因是貨􅁞農之具及花木果草藥什物有鬻龍骨叟與孫兒輩將龍骨齒角頭脊之𩔖凡數擔至暮貨之亦盡因問所得之處云某在靈池縣分棟山山去府城七十餘里北連秦隴南接資瀘山阜岡岫之間磎洞土穴之内有能興雲雨之處卽有龍蛻骨焉齒角頭足皆有五色者有白如綿者有年深朽腐者大十數丈小三五丈掘而得之甚多龍之蛻骨與蟬蛻無異又聞龍有五苦謂生時眠時媱時怒時蛻骨時也每年秋夏中一兩度愚遙見分棟山上隂雲勃起其間一物白色拖尾及夭蟜入雲如曵練長七八十尺時濯錦江橋上千人縱觀食頃方拏奮而沒旋有暴雨滂沱雷震數聲倐忽開霽得不為蛻骨者龍乎因􅁞市有王仲璋得一蛇蛻長五六尺腹甲下有四爪如雀之四爪胡本立得一龜小如錢緑色背有金線界成八卦𧰼鄭伯廣得一小瓢子如壘兩皂莢子堅實重厚無有及者休復亦曾得芝本兩層抱石而生每􅁞市好事者凌晨而往忽有遇神仙者或有遇靈藥者或有遇竒物者耆艾相傳青城山仙人𨼆士多因􅁞市接救人爾試金石開寶初錦江橋側有周處士者鬻十香丸以白器貯水浸小石子百顆餘各有紋縷如飛禽走獸花草雲鳯僧道之形者人常聚覩歎賞之中有一石如腎形烏潤每將磨金次色者益紫以此為異玉工見之云非試金石乃黑玉爾後有道士見云非黑玉是寶也若欲驗之以常石對秤此石加重數倍以水銀塗其上如傅粉焉若以大火烹之成紫磨金君當富矣周曰安敢火烹非惡冨也恐喪吾寶後經賊亂不知石所之休復因見道門仙人照寶經云凡百金之處旁熏樹木皆悉黄色若要辨之其石烏潤以水銀揩之自然粘著石上以秤秤有金者重於常石數倍若敲磕及磓擊終不能碎須以大火烹煅得眞金矣其金號曰寶金將煉為金液還丹服之羽化非世之常金也昔道士所言得於此經乎僧繇閣茂州近威戎軍有僧繇閣山路巇嶮人煙杜絕髙岡之下有龕豁如堂奥石壁上有畫觀音像一軀及當時畫功德主少長五人其石壁年深隨勢剝落雖風雨飄潤形狀愈明歳月經久而不昬晦不知其畫何得入石亦不知僧繇何以至此也石像新都縣四像院僧有卧像一軀盖生於石手足頭面衣紋纖介青黃色𨼆起狀若雕刻豈知胚混偶然成形乎採枸杞華陽邑村民段九者常入山野中採枸杞根莖貨之有年矣因於紫山脚下見枸杞一株甚大遂斸之根本怪異不𩔖常者長尺餘四莖如四足兩莖如頭尾若一獸形持歸村舍家狗吠之不已至夜四隅村落羣狗聚而吠之終夕不輟不堪其喧也遲明妻怒將充朝爨羣狗乃不復吠矣休復見道書云枸杞茯苓人參薯藥术等形有異者餌之皆獲上夀或除嗜慾嗇神抱和則必有真靈降顧接引為地仙爾趙公山淳化癸巳歳冬十月青城山民往趙公山採薪遇數苖薯藥頗大如常者村人度其下必大有薯藥遂與妻子同掘之深三尺餘但見根􅂡抱一大瓷合遂揭開視之有一大赤蛇如爛錦盤結合内村人悸慄以鋤觸之蛇乃翻然化一雉飛入溪水中合内唯餘一隻石􅆪村人持歸山舍其夜一室如晝村人轉懼此物異常送與莊主明年值順賊作亂不知此􅆪所存鹿水溪蛇陵州籍縣鹿水溪村民康化者雍熙乙酉歳秋有牧童晚歸值雨見溪中有大蛇引小蛇蟠蜿屈曲於泥中自大至小曳泥上岸入一穴内至末者曳泥窒其穴口並無蹤由其童驚駭目瞠口禁不能言至前春啟蟄時方稍語得父母問其不語之由方說溪中所見之物矣魚化為石青城縣漁者李克明釣歸傾其魚於竹器中有一魚化為石長四寸許鱗鬛燦然若活漁人婦見而愛之將與豎子為戲其豎子將石魚於椀水中或揺鬛振鱗浮泳而活漁者驚異取出置土甖中因是鄰里求觀者衆在水則活離水則為石率以為常時巡轄栢舍人虚舟取此魚看敲之中斷致于水中不復活矣趙十九趙十九名處琪䧟銀花衘鐙為業淳化中收得一鐵鏡頗有異常時有畢先生者名藏用字𨼆之年九十餘然不知所修之道嘗飲酒少食自言本天台山道士入川儒服三十餘年備厯蜀中名山勝景一日與處琪賫鐵鏡訪愚茅亭翫之其鏡可重一斤以來徑七八寸鼻大而圓遶鼻有四𧰼八卦外有大篆二十四字背面皆碧色每至望夜光明愈於别夜畢先生於景徳中擕至闕下值上封泰山因從觀大禮得召見稱旨遂與披掛賜紫服號通真大師封香令於青城山焚修御詩送行到川日訪愚茅亭問其鐵鏡已在貴人之處矣景山人玉壘山人景煥有文藝善畫龍涉獵經史撰野人閒話牧豎閒談住川城北隅數畞園蔬家族數口豐儉得中山人情性溫雅守道儉素未嘗與人有毫髪之競對人無老少必先稱名雍熙年初有冨家王仲璋者求山人畫龍初甚愛重後有人云景山人畫格品低於孫位黃筌遂將染為皂山人聞之曰何不速言酬以好絹恭謝而退嘗使小僕挈㡌隨行遇雨尋僕不見冒雨而歸妻問何以不戴㡌衣服濡濕山人云亢陽祈雨不許人戴帽其妻使婢送金釵還鄰家婢中路遺之泣告山人因他處假令還鄰人山人嘗於婢僕輩知其乏困飢寒誠謂君子不虐幼賤山人園圃中養二斑鵞夜見鵞糞中有光明往告之山人令以水淘之獲麩金二兩餘吁誰謂天葢髙何懲惡勸善如反掌耶彈鴛鴦章子朋者善書勒大字妙放小弩彈丸發無不中常自衒其能至道丙申歳往嘉州書僧院額自州乗船所至處彈獲飛禽供同船人食至青神縣維舟見二鴛鴦因發彈斃雄者將歸烹之其雌者隨至其船見雄者在鍋不顧沸湯投其中伸頸鼓翼長呌數聲而卒子朋戲曰人之為偶者如此蹈湯赴火相隨如是以為笑樂左傳謂忍人者其章子朋之謂乎蠶饅頭新繁縣李氏失其名家養蠶甚多將成値桑大貴遂不終飼而埋之鬻其桑葉大獲其利將買肉麫歸家造饅頭食之擘開每顆中有一蠶自此災癘俱興人口淪喪夫蠶者靈蟲衣被天下愚氓坑蠶獲利有此徴報爾太子大師後唐大同三年魏王統軍克蜀孟先主尚莊宗妹福慶長公主自太原節度馳赴西川至明宗晏駕宗室喪亂朝士奔竄有新羅僧擕莊宗諸子為僧入蜀投孟主即福慶長公主猶子也因為起院以莊宗萬夀節為名額蜀人號為太子大師曁聖朝弔伐入見闕庭有小師宗瑩酷好為詩其師自京歸檢校其院隳殘迨盡宗瑩與院主元亮設謀聞於時政以其師後唐宗裔不合住川由是為所奏發遣赴闕大師憂恚卒于劍門元亮與大師同日暴亡宗瑩因順賊入城焚燒院宇寄食諸寺中風恙二三年間患瘡疥狼狽終亦自縊而死鳴呼不畏于天不孝于師能無及此乎茅亭客話卷九
